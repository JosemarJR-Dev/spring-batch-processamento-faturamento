spring:
  datasource:
    url: jdbc:h2:mem:batchtest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  flyway:
    enabled: true
    locations: classpath:db/migration

batch:
  faturamento:
    simular-erro-transitorio: false
    id-venda-erro-transitorio: 1002
