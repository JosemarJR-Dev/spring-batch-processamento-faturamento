spring:
  application:
    name: spring-batch-processamento-faturamento-financeiro

  datasource:
    url: jdbc:h2:file:./data/batchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080