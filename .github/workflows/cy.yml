name: CI - Spring Batch

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build e testes
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v6

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Garantir permissao do Maven Wrapper
        run: chmod +x ./mvnw

      - name: Executar testes e build
        run: ./mvnw --batch-mode clean verify

      - name: Publicar relatorios de teste em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-testes
          path: target/surefire-reports/